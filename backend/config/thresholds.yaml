# Email Routing Thresholds Configuration

# Global default thresholds
global:
  confidence_threshold: 0.75
  auto_send_minimum_confidence: 0.80
  business_gate_threshold: 0.60

# Category-specific routing rules
# These override global settings for specific categories
routing_rules:
  pricing_inquiry:
    auto_send_threshold: 0.85
    description: "Standard pricing inquiries with product match"
    require_product_match: true
    max_auto_send_per_day: 50

  order_cancellation:
    auto_send_threshold: 0.90
    description: "Higher threshold due to financial impact"
    require_order_number: false
    escalate_if_amount_exceeds: 10000  # CNY
    always_notify_human: false

  order_tracking:
    auto_send_threshold: 0.82
    description: "Standard tracking inquiries"
    require_order_number: false
    always_notify_human: false

  shipping_time:
    auto_send_threshold: 0.80
    description: "General shipping time inquiries"
    always_notify_human: false

  shipping_exception:
    auto_send_threshold: 0.80
    description: "Exception handling with human notification"
    always_notify_human: true  # Always flag for review even if auto-sent
    escalate_if_urgent: true

  billing_invoice:
    auto_send_threshold: 0.88
    description: "Higher threshold for financial matters"
    escalate_if_amount_exceeds: 5000  # CNY
    always_notify_human: false

  non_business:
    auto_send_threshold: 0.95
    description: "Very high confidence required to ignore"
    always_notify_human: false

# Default routing rule for unmapped categories
default:
  auto_send_threshold: 0.80
  description: "Default threshold for unknown categories"
  always_notify_human: false

# Retry configuration for failed sends
retry:
  max_attempts: 3
  delay_seconds: 1.0
  exponential_backoff: false

# Rate limiting
rate_limiting:
  enabled: false
  max_auto_send_per_hour: 100
  max_auto_send_per_day: 500
