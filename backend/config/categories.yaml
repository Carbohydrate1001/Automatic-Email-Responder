# Email Classification Categories Configuration

categories:
  - id: pricing_inquiry
    label_en: "Pricing Inquiry"
    label_zh: "询价/报价"
    description: "Customer requests for product pricing or quotations"
    keywords:
      - "price"
      - "quote"
      - "quotation"
      - "cost"
      - "rate"
      - "询价"
      - "报价"
      - "价格"

  - id: order_cancellation
    label_en: "Order Cancellation"
    label_zh: "取消订单/退款"
    description: "Cancellation or refund requests"
    keywords:
      - "cancel"
      - "refund"
      - "return"
      - "取消"
      - "退款"
      - "退货"

  - id: order_tracking
    label_en: "Order Tracking"
    label_zh: "订单追踪"
    description: "Order status and logistics tracking inquiries"
    keywords:
      - "track"
      - "tracking"
      - "status"
      - "where"
      - "location"
      - "追踪"
      - "物流"
      - "状态"
      - "在哪"

  - id: shipping_time
    label_en: "Shipping Time"
    label_zh: "运输时间查询"
    description: "Shipping duration and ETA inquiries"
    keywords:
      - "how long"
      - "duration"
      - "time"
      - "eta"
      - "arrival"
      - "多久"
      - "时间"
      - "到达"
      - "预计"

  - id: shipping_exception
    label_en: "Shipping Exception"
    label_zh: "运输异常"
    description: "Delays, damage, or abnormal shipping events"
    keywords:
      - "delay"
      - "delayed"
      - "damage"
      - "damaged"
      - "lost"
      - "exception"
      - "problem"
      - "延误"
      - "损坏"
      - "丢失"
      - "异常"
      - "问题"

  - id: billing_invoice
    label_en: "Billing/Invoice"
    label_zh: "账单/发票"
    description: "Billing, invoice, and payment inquiries"
    keywords:
      - "invoice"
      - "bill"
      - "billing"
      - "payment"
      - "receipt"
      - "发票"
      - "账单"
      - "付款"
      - "收据"

  - id: non_business
    label_en: "Non-Business"
    label_zh: "非业务邮件（无需回复）"
    description: "Newsletters, marketing, system notifications, or non-service content"
    keywords:
      - "newsletter"
      - "unsubscribe"
      - "promotion"
      - "marketing"
      - "notification"
      - "通知"
      - "营销"
      - "订阅"

