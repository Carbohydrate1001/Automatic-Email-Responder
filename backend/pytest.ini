[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=services
    --cov=models
    --cov=routes
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70

markers =
    unit: Unit tests
    integration: Integration tests
    edge_case: Edge case tests
    slow: Slow running tests
